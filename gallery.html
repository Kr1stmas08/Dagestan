<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея — Душа Дагестана</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --emerald: #2C5F4F;
            --gold: #D4AF37;
            --gold-light: #e8c85a;
            --night: #0A1128;
            --cream: #FAF7F2;
            --white: #ffffff;
            
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            
            --transition-fast: 0.2s ease;
            --transition-normal: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: #333;
            line-height: 1.7;
        }

        a { color: inherit; text-decoration: none; }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 5%;
            background: rgba(10, 17, 40, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
        }

        .navbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 3px;
        }

        .logo-text span { color: var(--gold); }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu a {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition-fast);
        }

        .nav-menu a:hover, .nav-menu a.active { color: var(--gold); }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
        }

        .nav-toggle span {
            width: 28px;
            height: 2px;
            background: var(--white);
        }

        /* Page Header */
        .page-header {
            padding: 160px 5% 60px;
            text-align: center;
            background: var(--night);
            color: var(--white);
        }

        .page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 20px;
        }

        .page-header h1 span { color: var(--gold); }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 40px 5%;
            background: var(--cream);
        }

        .filter-btn {
            padding: 12px 24px;
            background: var(--white);
            border: 2px solid transparent;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .filter-btn:hover {
            border-color: var(--emerald);
            color: var(--emerald);
        }

        .filter-btn.active {
            background: var(--emerald);
            color: var(--white);
        }

        /* Gallery Grid */
        .gallery-section {
            padding: 20px 5% 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-auto-rows: 10px;
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .gallery-item.hidden {
            display: none;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,17,40,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: var(--transition-normal);
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            color: var(--white);
            transform: translateY(20px);
            opacity: 0;
            transition: var(--transition-normal);
            z-index: 2;
        }

        .gallery-item:hover .gallery-item-info {
            transform: translateY(0);
            opacity: 1;
        }

        .gallery-item-info h3 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .gallery-item-info span {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Different sizes for masonry */
        .gallery-item.tall { grid-row: span 35; }
        .gallery-item.medium { grid-row: span 28; }
        .gallery-item.short { grid-row: span 22; }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-normal);
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: var(--radius-md);
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: none;
            border: none;
            color: var(--white);
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .lightbox-close:hover { color: var(--gold); }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--white);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .lightbox-nav:hover {
            background: var(--gold);
            color: var(--night);
        }

        .lightbox-prev { left: -70px; }
        .lightbox-next { right: -70px; }

        .lightbox-caption {
            text-align: center;
            color: var(--white);
            margin-top: 20px;
        }

        .lightbox-caption h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .lightbox-caption span { opacity: 0.7; }

        /* Footer */
        footer {
            background: var(--night);
            padding: 40px 5%;
            text-align: center;
            color: rgba(255,255,255,0.5);
        }

        footer a { color: var(--gold); }

        /* Responsive */
        @media (max-width: 992px) {
            .nav-menu {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background: var(--night);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                transition: right var(--transition-normal);
            }

            .nav-menu.active { right: 0; }
            .nav-toggle { display: flex; }

            .lightbox-prev { left: 10px; }
            .lightbox-next { right: 10px; }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-btn {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
